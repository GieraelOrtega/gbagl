<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="theme-color" content="#412b47" />
  <title>GBAGL — Offline</title>
  <link rel="manifest" href="/manifest.webmanifest?v=gk-ux-1" />
  <link rel="stylesheet" href="/css/style.css?v=gk-ux-1" />
</head>
<body class="lock-screen" data-offline-snapshot>
  <main class="lock-screen__main" id="main-content">
    <section class="passcode" aria-labelledby="offline-title">
      <p class="passcode__eyebrow">GBAGL</p>
      <h1 class="passcode__title" id="offline-title">You are offline</h1>
      <p class="passcode__hint">Previously viewed read-only pages may still be available from your browser history. Reconnect to unlock or make changes.</p>
      <p class="pwa-controls"><span class="network-status network-status--offline">Offline · read-only copies</span></p>
    </section>
  </main>
  <script src="/js/pwa.js"></script>
</body>
</html>
